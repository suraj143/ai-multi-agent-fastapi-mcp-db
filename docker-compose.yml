version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: pg_main
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  agentA:
    build: ./agentA
    container_name: mcp_agentA
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8001:8001"

  agentB:
    build: ./agentB
    container_name: mcp_agentB
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8002:8002"

  orchestrator:
    build: ./orchestrator
    container_name: mcp_orchestrator
    depends_on:
      agentA:
        condition: service_started
      agentB:
        condition: service_started
    env_file:
      - .env
    ports:
      - "9001:9001"

  fastapi_app:
    build: ./fastapi_app
    container_name: fastapi_entry
    depends_on:
      orchestrator:
        condition: service_started
    env_file:
      - .env
    ports:
      - "9000:9000"

volumes:
  pgdata:
